<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arshad AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

html,body{
  height:100%;
}

body{
  display:flex;
  background:radial-gradient(circle at top left,#0f172a,#020617);
  color:white;
}

/* LOGIN */
#loginBox{
  display:flex;
  flex-direction:column;
  margin:auto;
  width:90%;
  max-width:360px;
  padding:30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  gap:15px;
}
#loginBox input{
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
}
#loginBox button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* APP */
#app{
  display:none;
  flex:1;
  width:100%;
  height:100dvh; /* 🔥 mobile fix */
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  padding:15px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.sidebar button{
  background:none;
  border:none;
  color:inherit;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  gap:8px;
  align-items:center;
}
.sidebar button:hover{background:rgba(255,255,255,0.1);}
.chat-list{flex:1;margin-top:15px;}
.chat-item{
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  font-size:14px;
}
.chat-item.active{background:linear-gradient(135deg,#3b82f6,#9333ea);}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px 15px;
  height:100%;
}

/* HEADER smaller */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:45px;
}
.header h2{
  font-size:18px;
}
.menu-btn{
  display:none;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}
.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
  font-weight:600;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:10px 0;
}
.message{
  padding:12px 16px;
  border-radius:16px;
  max-width:80%;
  white-space:pre-wrap;
  font-size:14px;
}
.user{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  align-self:flex-end;
}
.bot{
  background:rgba(255,255,255,0.08);
  align-self:flex-start;
}

/* INPUT */
.input-area{
  display:flex;
  gap:8px;
  padding-top:8px;
}
.input-area textarea{
  flex:1;
  resize:none;
  border-radius:14px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:14px;
  max-height:120px;
  overflow-y:auto;
}
.input-area button{
  padding:10px 14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  #app{flex-direction:column;}
  .sidebar{
    position:fixed;
    left:-240px;
    top:0;
    height:100%;
    z-index:1000;
    transition:0.3s;
  }
  .sidebar.active{left:0;}
  .menu-btn{display:block;}
}
</style>
</head>
<body>

<div id="loginBox">
<h2>Welcome to Arshad AI 🚀</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app">

<div class="sidebar" id="sidebar">
<button onclick="newChat()"><i data-feather="plus"></i> New Chat</button>
<div class="chat-list" id="chatList"></div>
<button onclick="logout()"><i data-feather="log-out"></i> Logout</button>
</div>

<div class="main">
<div class="header">
<button class="menu-btn" onclick="toggleSidebar()"><i data-feather="menu"></i></button>
<h2>Arshad AI 🤖</h2>
<div class="avatar">AI</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<textarea id="userInput" placeholder="Ask anything..."></textarea>
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>

<script>
feather.replace();

function login(){
  if(email.value==="admin@arshad.ai" && password.value==="1234"){
    localStorage.setItem("user","admin");
    loginBox.style.display="none";
    app.style.display="flex";
    loadChats();
  } else alert("Invalid credentials");
}

if(localStorage.getItem("user")){
  loginBox.style.display="none";
  app.style.display="flex";
  loadChats();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function toggleSidebar(){
  sidebar.classList.toggle("active");
}

let chats=[];
let active=null;

function saveChats(){
  localStorage.setItem("chats",JSON.stringify(chats));
}

function loadChats(){
  let saved=localStorage.getItem("chats");
  if(saved) chats=JSON.parse(saved);
  if(chats.length) active=chats[0].id;
  renderChatList();
  renderMessages();
}

function newChat(){
  let id=Date.now();
  chats.unshift({id:id,title:"New Chat",messages:[]});
  active=id;
  saveChats();
  renderChatList();
  renderMessages();
}

function renderChatList(){
  chatList.innerHTML="";
  chats.forEach(c=>{
    let div=document.createElement("div");
    div.className="chat-item "+(c.id===active?"active":"");
    div.innerText=c.title;
    div.onclick=()=>{active=c.id;renderChatList();renderMessages();if(window.innerWidth<768)toggleSidebar();};
    chatList.appendChild(div);
  });
}

function renderMessages(){
  chat.innerHTML="";
  let c=chats.find(x=>x.id===active);
  if(!c) return;
  c.messages.forEach(m=>addMessage(m.role,m.text));
  chat.scrollTop=chat.scrollHeight;
}

function addMessage(role,text){
  let div=document.createElement("div");
  div.className="message "+role;
  div.innerText=text;
  chat.appendChild(div);
}

function sendMessage(){
  let text=userInput.value.trim();
  if(!text||!active) return;
  let c=chats.find(x=>x.id===active);

  if(c.messages.length===0){
    c.title=text.substring(0,20)+"...";
  }

  c.messages.push({role:"user",text:text});
  addMessage("user",text);
  userInput.value="";
  saveChats();

  let reply="Hello Arshad 🚀 Your mobile UI is now perfectly optimized!";
  let botDiv=document.createElement("div");
  botDiv.className="message bot";
  chat.appendChild(botDiv);

  let i=0;
  function type(){
    if(i<reply.length){
      botDiv.innerText+=reply[i++];
      chat.scrollTop=chat.scrollHeight;
      setTimeout(type,15);
    }else{
      c.messages.push({role:"bot",text:reply});
      saveChats();
    }
  }
  type();
}

userInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
