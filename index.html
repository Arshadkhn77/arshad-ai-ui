<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arshad AI Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e293b);
background-size:400% 400%;
animation:gradient 12s ease infinite;
color:white;
transition:0.3s;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body.light{
background:linear-gradient(-45deg,#f1f5f9,#e2e8f0,#f8fafc,#e2e8f0);
color:#111;
}

/* LOGIN */
.login-box{
width:350px;
padding:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 0 25px rgba(59,130,246,0.4);
display:flex;
flex-direction:column;
gap:15px;
}

.login-box input{
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:inherit;
}

.login-box button{
padding:12px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{transform:scale(1.05);}

/* APP */
.app{display:none;width:100%;height:100vh;}

/* Sidebar */
.sidebar{
width:220px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar button{
background:none;
border:none;
color:inherit;
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:rgba(255,255,255,0.1);
}

/* Main */
.main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

/* Avatar */
.avatar{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
animation:float 3s ease-in-out infinite;
box-shadow:0 0 20px rgba(59,130,246,0.6);
}

.avatar.talking{animation:pulse 1s infinite;}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

@keyframes pulse{
0%{box-shadow:0 0 10px #3b82f6}
50%{box-shadow:0 0 25px #9333ea}
100%{box-shadow:0 0 10px #3b82f6}
}

/* Chat */
.chat{
flex:1;
overflow-y:auto;
margin:15px 0;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:12px 16px;
border-radius:14px;
max-width:70%;
white-space:pre-wrap;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.bot{
background:rgba(255,255,255,0.1);
}

/* Input */
.input-area{
display:flex;
gap:10px;
}

.input-area textarea{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
resize:none;
background:rgba(255,255,255,0.1);
color:inherit;
height:50px;
}

.input-area button{
padding:12px;
border-radius:12px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h2>Login to Arshad AI</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="sidebar">
<button onclick="toggleTheme()">
<i data-feather="moon"></i> Theme
</button>
<button onclick="logout()">
<i data-feather="log-out"></i> Logout
</button>
</div>

<div class="main">

<div class="header">
<h2>Arshad AI 🤖</h2>
<div class="avatar" id="avatar">AI</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<textarea id="userInput" placeholder="Type message... (Enter = Send, Shift+Enter = New line)"></textarea>
<button onclick="sendMessage()">Send</button>
</div>

</div>
</div>

<script>
feather.replace();

/* LOGIN */
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(email==="admin@arshad.ai" && pass==="1234"){
localStorage.setItem("loggedIn","true");
showApp();
}else{
alert("Invalid credentials");
}
}

function logout(){
localStorage.removeItem("loggedIn");
location.reload();
}

function showApp(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="flex";
}

if(localStorage.getItem("loggedIn")){
showApp();
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* CHAT */
function addMessage(role,text){
let div=document.createElement("div");
div.className="message "+role;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;
}

/* Typing Effect */
function typeText(element,text){
let i=0;
element.innerText="";
let interval=setInterval(()=>{
element.innerText+=text.charAt(i);
i++;
if(i>=text.length){
clearInterval(interval);
document.getElementById("avatar").classList.remove("talking");
}
},20);
}

function sendMessage(){
let input=document.getElementById("userInput");
let text=input.value.trim();
if(!text) return;

addMessage("user",text);
input.value="";

let botDiv=document.createElement("div");
botDiv.className="message bot";
document.getElementById("chat").appendChild(botDiv);

document.getElementById("avatar").classList.add("talking");

setTimeout(()=>{
typeText(botDiv,"Hello, I am Arshad AI Elite 🚀");
},600);
}

/* ENTER KEY SUPPORT */
document.getElementById("userInput").addEventListener("keydown", function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMessage();
}
});
</script>

</body>
</html>
