<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arshad AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
}

/* DARK MODE DEFAULT */
body.dark {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* LIGHT MODE */
body.light {
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    color: #222;
}

/* LOGIN SCREEN */
.login-container {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    text-align: center;
}

.login-container input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

.login-container button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #00c6ff;
    color: white;
    font-weight: 600;
}

/* CHAT CONTAINER */
.chat-container {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    padding: 40px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.toggle-btn {
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #00c6ff;
    color: white;
    font-weight: 600;
}

.chat-box {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    overflow-y: auto;
    margin-bottom: 20px;
}

.input-area {
    display: flex;
    gap: 10px;
}

.input-area input {
    flex: 1;
    padding: 15px;
    border-radius: 12px;
    border: none;
}

.input-area button {
    padding: 15px 25px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: #0072ff;
    color: white;
    font-weight: 600;
}
</style>
</head>

<body class="dark">

<!-- LOGIN PAGE -->
<div class="login-container" id="loginPage">
    <h2>🔐 Login to Arshad AI</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
</div>

<!-- CHAT PAGE -->
<div class="chat-container" id="chatPage">
    <div class="header">
        <h1>🤖 Arshad AI</h1>
        <button class="toggle-btn" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div class="chat-box" id="chatBox">
        <p><strong>Arshad AI:</strong> Welcome Arshad 🚀</p>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." 
        onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

/* SIMPLE LOGIN (Static Demo) */
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
    } else {
        alert("Invalid credentials! Use admin / 1234");
    }
}

/* DARK LIGHT TOGGLE */
function toggleMode() {
    const body = document.body;
    if(body.classList.contains("dark")) {
        body.classList.remove("dark");
        body.classList.add("light");
    } else {
        body.classList.remove("light");
        body.classList.add("dark");
    }
}

/* CHAT FUNCTION */
function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    chatBox.innerHTML += "<p><strong>You:</strong> " + input.value + "</p>";
    chatBox.innerHTML += "<p><strong>Arshad AI:</strong> This is a static AI response 🤖</p>";

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
